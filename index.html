<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cutter RPG | Admin</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #38bdf8; --danger: #ef4444; --border: #334155; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: var(--card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: #0f172a; }
        #dashboard { display: none; width: 90%; max-width: 900px; margin: 20px auto; align-self: flex-start; }
        .room-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .room-header { background: rgba(255,255,255,0.05); padding: 10px 15px; font-weight: bold; color: var(--primary); }
        .player-table { width: 100%; border-collapse: collapse; }
        .player-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .kick-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .badge { font-size: 11px; background: #334155; padding: 2px 6px; border-radius: 4px; color: #94a3b8; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login" class="login-box">
        <h2>Admin Access</h2>
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-primary" onclick="doLogin()">Login</button>
    </div>

    <div id="dashboard">
        <h1>Server Monitor</h1>
        <div id="roomList"></div>
    </div>

    <script>
        // Use the server URL found in your scripts.js
        const socket = io("https://server-5jkd.onrender.com/");

        function doLogin() {
            socket.emit("admin-login", document.getElementById('pass').value);
        }

        socket.on("admin-confirmed", (data) => {
            document.getElementById('login').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            render(data);
        });

        socket.on("admin-update", (data) => render(data));

        function render(rooms) {
            const list = document.getElementById('roomList');
            list.innerHTML = "";
            
            const roomNames = Object.keys(rooms).filter(r => r !== "admin-group");
            if (roomNames.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#64748b;'>No active rooms.</p>";
                return;
            }

            roomNames.forEach(name => {
                let html = `<div class="room-card"><div class="room-header">ROOM: ${name}</div><table class="player-table">`;
                for (let id in rooms[name]) {
                    const p = rooms[name][id];
                    html += `<tr>
                        <td><code>${id}</code><br><span class="badge">${p.origin}</span></td>
                        <td><b>HP: ${p.hp || 100}</b><br><small>X:${Math.round(p.x)}, Y:${Math.round(p.y)}</small></td>
                        <td style="text-align:right"><button class="kick-btn" onclick="kick('${id}')">KICK</button></td>
                    </tr>`;
                }
                html += `</table></div>`;
                list.innerHTML += html;
            });
        }

        function kick(id) {
            if(confirm("Kick player?")) socket.emit("admin-kick", id);
        }
        //hi
    </script>
</body>
</html>
