<!DOCTYPE html>
<html>
<head>
    <title>RPG Admin Panel</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; }
        #admin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; padding: 20px; overflow-y: auto; }
        .player-card { background: #333; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #444; display: inline-block; vertical-align: top; width: 280px; }
        .controls input { width: 60px; padding: 5px; margin: 2px; background: #444; color: white; border: 1px solid #666; }
        .controls button { padding: 5px 10px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 3px; margin-top: 5px; }
        .kick-btn { background: #c0392b !important; }
        #announcement-bar { margin-bottom: 20px; padding: 10px; background: #444; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="admin-overlay">
        <h1>ADMIN DASHBOARD</h1>
        <div id="announcement-bar">
            <input type="text" id="global-msg" placeholder="System message...">
            <button onclick="sendAnnouncement()">Send Global Announcement</button>
        </div>
        <div id="player-list"></div>
        <button onclick="document.getElementById('admin-overlay').style.display='none'">Close</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Login prompt on load
        const pass = prompt("Admin Password:");
        socket.emit("admin-login", pass);

        socket.on("admin-confirmed", () => { document.getElementById('admin-overlay').style.display='block'; });
        socket.on("admin-denied", () => { alert("Wrong password."); });

        socket.on("admin-update", (rooms) => {
            const list = document.getElementById("player-list");
            list.innerHTML = "";
            for (let roomId in rooms) {
                for (let id in rooms[roomId]) {
                    const p = rooms[roomId][id];
                    list.innerHTML += `
                        <div class="player-card">
                            <strong>${p.name}</strong> (${id})<br>
                            Room: ${roomId}<br>
                            Pos: ${Math.round(p.x)}, ${Math.round(p.y)} | HP: ${p.hp}<br>
                            <div class="controls">
                                <hr>
                                <strong>Teleport</strong><br>
                                X: <input id="x-${id}" value="${p.x}"> 
                                Y: <input id="y-${id}" value="${p.y}">
                                <button onclick="tp('${id}')">Go</button>
                                <hr>
                                <strong>Resources</strong><br>
                                Wood: <input id="wood-${id}" value="0">
                                Money: <input id="money-${id}" value="0">
                                <button onclick="setRes('${id}')">Set</button>
                                <hr>
                                <button class="kick-btn" onclick="kick('${id}')">Kick Player</button>
                            </div>
                        </div>`;
                }
            }
        });

        function tp(id) {
            const x = parseInt(document.getElementById(`x-${id}`).value);
            const y = parseInt(document.getElementById(`y-${id}`).value);
            socket.emit("admin-teleport", { targetId: id, x, y });
        }

        function setRes(id) {
            const wood = parseInt(document.getElementById(`wood-${id}`).value);
            const money = parseInt(document.getElementById(`money-${id}`).value);
            socket.emit("admin-set-resources", { targetId: id, type: 'wood', amount: wood });
            socket.emit("admin-set-resources", { targetId: id, type: 'money', amount: money });
        }

        function kick(id) { socket.emit("admin-kick", id); }
        function sendAnnouncement() {
            const msg = document.getElementById("global-msg").value;
            socket.emit("admin-announce", msg);
        }
    </script>
</body>
</html>
