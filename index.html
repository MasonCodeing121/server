<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cutter RPG | Admin Panel</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --primary: #38bdf8; 
            --danger: #ef4444; 
            --border: #334155; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }

        /* NEW LOGIN BOX STYLE */
        #login-container {
            margin-top: 100px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }
        #login-container h1 { color: var(--primary); margin-bottom: 5px; }
        #login-container p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        
        input { 
            width: 90%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background: #0f172a; 
            color: white; 
            font-size: 1rem;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }

        /* DASHBOARD STYLE */
        #admin-dashboard { display: none; width: 100%; max-width: 900px; }
        .room-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            margin-bottom: 20px; 
            padding: 15px; 
        }
        .room-header { color: var(--primary); font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #334155; }
        .kick-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-container">
        <h1>Cutter Admin</h1>
        <p>Enter management credentials to proceed</p>
        <input type="password" id="pass-input" placeholder="Password...">
        <button class="btn-login" onclick="attemptLogin()">Access Terminal</button>
        <div id="error-msg" style="color: var(--danger); margin-top: 10px; font-size: 0.8rem; display: none;">Invalid Password</div>
    </div>

    <div id="admin-dashboard">
        <h2>Live Server Monitor</h2>
        <div id="room-list"></div>
    </div>

    <script>
        const socket = io("https://server-5jkd.onrender.com/");
        let isAuthenticated = false;

        function attemptLogin() {
            const pass = document.getElementById('pass-input').value;
            socket.emit("admin-login", pass);
        }

        socket.on("admin-confirmed", (rooms) => {
            isAuthenticated = true;
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            renderRooms(rooms);
        });

        socket.on("admin-denied", () => {
            document.getElementById('error-msg').style.display = 'block';
        });

        socket.on("admin-update", (rooms) => {
            if (isAuthenticated) {
                renderRooms(rooms);
            }
        });

        function renderRooms(rooms) {
            const list = document.getElementById('room-list');
            
            // CRITICAL: We check if any input currently has focus
            // If the user is typing, we DON'T overwrite the HTML
            if (document.activeElement.tagName === 'INPUT') return;

            list.innerHTML = "";
            for (let name in rooms) {
                let html = `
                    <div class="room-card">
                        <div class="room-header">ROOM: ${name}</div>
                        <table>
                `;
                for (let id in rooms[name]) {
                    const p = rooms[name][id];
                    html += `
                        <tr>
                            <td>
                                <b>${p.name || 'Player'}</b><br>
                                <small style="color:#64748b">${id}</small>
                            </td>
                            <td>HP: ${p.hp} | X: ${Math.round(p.x)}</td>
                            <td style="text-align:right">
                                <button class="kick-btn" onclick="kick('${id}')">KICK</button>
                            </td>
                        </tr>
                    `;
                }
                html += `</table></div>`;
                list.innerHTML += html;
            }
        }

        function kick(id) {
            if(confirm("Kick player " + id + "?")) {
                socket.emit("admin-kick", id);
            }
        }

        // Allow "Enter" key to login
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });
    </script>
</body>
</html>
